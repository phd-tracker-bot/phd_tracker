<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇帝养成日记 - 连接测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="bg-gradient-to-br from-yellow-50 to-orange-50 min-h-screen p-4 md:p-8">
    <div class="max-w-lg mx-auto">
        <div class="text-center mb-8">
            <div class="text-6xl mb-3">👑</div>
            <h1 class="text-3xl font-black bg-gradient-to-r from-orange-500 to-pink-500 bg-clip-text text-transparent">皇帝养成日记</h1>
            <p class="text-gray-500 text-sm mt-2">Supabase 连接测试</p>
        </div>

        <!-- Login/Register -->
        <div id="authSection" class="bg-white rounded-2xl shadow-lg p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-800 mb-4">📮 邮箱登录 / 注册</h2>
            <div class="space-y-3">
                <input type="email" id="emailInput" placeholder="邮箱地址" class="w-full p-3 border-2 rounded-xl outline-none focus:border-orange-400 text-sm">
                <input type="password" id="passwordInput" placeholder="密码（至少6位）" class="w-full p-3 border-2 rounded-xl outline-none focus:border-orange-400 text-sm">
                <div class="flex gap-3">
                    <button onclick="doLogin()" class="flex-1 bg-orange-500 text-white py-3 rounded-xl font-bold hover:bg-orange-600 transition">登录</button>
                    <button onclick="doRegister()" class="flex-1 bg-blue-500 text-white py-3 rounded-xl font-bold hover:bg-blue-600 transition">注册</button>
                </div>
            </div>
            <div id="authStatus" class="mt-3 text-center text-sm"></div>
        </div>

        <!-- User Info (shown after login) -->
        <div id="userSection" class="bg-white rounded-2xl shadow-lg p-6 mb-6 hidden">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h2 class="text-lg font-bold text-green-600">✅ 已登录</h2>
                    <p id="userEmail" class="text-sm text-gray-500"></p>
                    <p id="userId" class="text-xs text-gray-400 font-mono"></p>
                </div>
                <button onclick="doLogout()" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-50 hover:text-red-500 transition">退出</button>
            </div>
        </div>

        <!-- Leaderboard Test -->
        <div id="leaderboardSection" class="bg-white rounded-2xl shadow-lg p-6 mb-6 hidden">
            <h2 class="text-lg font-bold text-gray-800 mb-3">🏆 排行榜测试</h2>
            <div class="space-y-3">
                <div>
                    <label class="text-xs font-bold text-gray-500">昵称</label>
                    <input type="text" id="nicknameInput" placeholder="给自己起个名号" class="w-full p-2 border rounded-xl outline-none text-sm mt-1">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500">模拟专注分钟数</label>
                    <input type="number" id="focusInput" value="25" class="w-full p-2 border rounded-xl outline-none text-sm mt-1">
                </div>
                <button onclick="submitScore()" class="w-full bg-purple-500 text-white py-2.5 rounded-xl font-bold hover:bg-purple-600 transition">📤 提交到排行榜</button>
            </div>
            <div id="leaderboardList" class="mt-4 space-y-2"></div>
        </div>

        <!-- Data Sync Test -->
        <div id="dataSection" class="bg-white rounded-2xl shadow-lg p-6 mb-6 hidden">
            <h2 class="text-lg font-bold text-gray-800 mb-3">💾 数据同步测试</h2>
            <div class="space-y-3">
                <textarea id="testDataInput" rows="3" placeholder="写点什么测试同步..." class="w-full p-2 border rounded-xl outline-none text-sm resize-none"></textarea>
                <div class="flex gap-2">
                    <button onclick="saveTestData()" class="flex-1 bg-green-500 text-white py-2.5 rounded-xl font-bold hover:bg-green-600 transition">💾 保存到云端</button>
                    <button onclick="loadTestData()" class="flex-1 bg-blue-500 text-white py-2.5 rounded-xl font-bold hover:bg-blue-600 transition">📥 从云端读取</button>
                </div>
                <div id="dataStatus" class="text-center text-sm text-gray-500"></div>
            </div>
        </div>

        <!-- Connection Log -->
        <div class="bg-gray-800 rounded-2xl p-4">
            <h3 class="text-green-400 text-sm font-bold mb-2">📋 连接日志</h3>
            <div id="logArea" class="text-xs text-green-300 font-mono space-y-1 max-h-60 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://proxy.lizifu666.workers.dev';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4Z21pY3lrcXRnenpic3Fna2VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NjE2NzgsImV4cCI6MjA5MTQzNzY3OH0.kBAe3xIgIk0sQn5Z4pjtaDft_fTrV7dSoiYjAhTMGIs';
        
        let sb = null;
        let currentUser = null;

        function log(msg, isError) {
            const div = document.getElementById('logArea');
            const time = new Date().toLocaleTimeString();
            div.innerHTML += `<div class="${isError ? 'text-red-400' : 'text-green-300'}">[${time}] ${msg}</div>`;
            div.scrollTop = div.scrollHeight;
        }

        // Init
        window.addEventListener('load', function() {
            log('🔄 正在加载 Supabase SDK...');
            
            if (typeof window.supabase === 'undefined') {
                log('❌ Supabase SDK 未加载，可能被网络拦截', true);
                document.getElementById('authStatus').innerHTML = '<span class="text-red-500">❌ SDK 加载失败，请检查网络</span>';
                return;
            }

            try {
                sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                log('✅ Supabase 客户端初始化成功');
            } catch(e) {
                log('❌ 初始化失败: ' + e.message, true);
                return;
            }
            
            sb.auth.onAuthStateChange((event, session) => {
                log('🔑 Auth: ' + event);
                if (session?.user) {
                    currentUser = session.user;
                    showLoggedIn();
                    loadLeaderboard();
                } else {
                    currentUser = null;
                    showLoggedOut();
                }
            });

            sb.auth.getSession().then(({ data }) => {
                if (data.session?.user) {
                    currentUser = data.session.user;
                    showLoggedIn();
                    loadLeaderboard();
                    log('✅ 已恢复登录状态');
                } else {
                    log('ℹ️ 未登录，请注册或登录');
                }
            });
        });

        function showLoggedIn() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('userSection').classList.remove('hidden');
            document.getElementById('leaderboardSection').classList.remove('hidden');
            document.getElementById('dataSection').classList.remove('hidden');
            document.getElementById('userEmail').innerText = currentUser.email;
            document.getElementById('userId').innerText = 'UID: ' + currentUser.id;
        }

        function showLoggedOut() {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('userSection').classList.add('hidden');
            document.getElementById('leaderboardSection').classList.add('hidden');
            document.getElementById('dataSection').classList.add('hidden');
        }

        async function doRegister() {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passwordInput').value;
            if (!email || !pass) { alert('请填写邮箱和密码'); return; }
            if (pass.length < 6) { alert('密码至少6位'); return; }
            
            log('📤 正在注册 ' + email + '...');
            const { data, error } = await sb.auth.signUp({ email, password: pass });
            
            if (error) {
                log('❌ 注册失败: ' + error.message, true);
                document.getElementById('authStatus').innerHTML = `<span class="text-red-500">${error.message}</span>`;
            } else {
                log('✅ 注册成功！');
                document.getElementById('authStatus').innerHTML = '<span class="text-green-500">✅ 注册成功！如需邮箱验证请查收邮件。</span>';
            }
        }

        async function doLogin() {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passwordInput').value;
            if (!email || !pass) { alert('请填写邮箱和密码'); return; }
            
            log('📤 正在登录 ' + email + '...');
            const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
            
            if (error) {
                log('❌ 登录失败: ' + error.message, true);
                document.getElementById('authStatus').innerHTML = `<span class="text-red-500">${error.message}</span>`;
            } else {
                log('✅ 登录成功！');
            }
        }

        async function doLogout() {
            await sb.auth.signOut();
            log('👋 已退出登录');
        }

        // ===== Leaderboard =====
        async function submitScore() {
            if (!currentUser) return;
            const nickname = document.getElementById('nicknameInput').value.trim() || '无名侠客';
            const focus = parseInt(document.getElementById('focusInput').value) || 0;
            
            log('📤 提交排行榜: ' + nickname + ' / ' + focus + 'min');
            
            const { error } = await sb.from('leaderboard').upsert({
                user_id: currentUser.id,
                nickname,
                week_focus: focus,
                week_check_days: 1,
                week_tasks: 0,
                streak: 1,
                last_sync: new Date().toISOString()
            }, { onConflict: 'user_id' });

            if (error) {
                log('❌ 提交失败: ' + error.message, true);
                if (error.message.includes('relation') || error.message.includes('does not exist')) {
                    log('⚠️ 需要先创建数据表，请看下方说明', true);
                    document.getElementById('leaderboardList').innerHTML = `
                        <div class="bg-yellow-50 p-3 rounded-xl text-xs text-yellow-800 border border-yellow-200">
                            <p class="font-bold mb-1">需要创建数据表：</p>
                            <p>去 Supabase Dashboard → SQL Editor → 运行：</p>
                            <pre class="bg-gray-800 text-green-300 p-2 rounded mt-1 overflow-x-auto text-[10px]">CREATE TABLE leaderboard (
  user_id UUID PRIMARY KEY REFERENCES auth.users(id),
  nickname TEXT,
  week_focus INT DEFAULT 0,
  week_check_days INT DEFAULT 0,
  week_tasks INT DEFAULT 0,
  streak INT DEFAULT 0,
  last_sync TIMESTAMPTZ DEFAULT now()
);

ALTER TABLE leaderboard ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Anyone can read" ON leaderboard FOR SELECT USING (true);
CREATE POLICY "Users write own" ON leaderboard FOR ALL USING (auth.uid() = user_id);

CREATE TABLE user_data (
  user_id UUID PRIMARY KEY REFERENCES auth.users(id),
  app_data JSONB,
  last_sync TIMESTAMPTZ DEFAULT now()
);

ALTER TABLE user_data ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Users read own" ON user_data FOR SELECT USING (auth.uid() = user_id);
CREATE POLICY "Users write own" ON user_data FOR ALL USING (auth.uid() = user_id);</pre>
                        </div>`;
                }
            } else {
                log('✅ 排行榜已更新');
                loadLeaderboard();
            }
        }

        async function loadLeaderboard() {
            const { data, error } = await supabase
                .from('leaderboard')
                .select('*')
                .order('week_focus', { ascending: false });
            
            if (error) {
                log('⚠️ 排行榜加载: ' + error.message);
                return;
            }
            
            log('✅ 排行榜加载: ' + (data?.length || 0) + ' 条记录');
            
            const rankTitles = ['👑 皇帝', '🗡️ 丞相', '🛡️ 大将军', '📜 御史', '🏯 太守'];
            const list = document.getElementById('leaderboardList');
            if (!data || data.length === 0) {
                list.innerHTML = '<div class="text-center text-gray-400 text-sm py-3">暂无数据，提交一个试试！</div>';
                return;
            }
            
            list.innerHTML = data.map((u, i) => {
                const isMe = currentUser && u.user_id === currentUser.id;
                const rank = rankTitles[Math.min(i, rankTitles.length - 1)];
                return `<div class="flex items-center gap-3 p-2 rounded-xl ${isMe ? 'bg-purple-50 border border-purple-200' : 'bg-gray-50'} text-sm">
                    <span class="font-bold w-6 text-center">${i + 1}</span>
                    <div class="flex-1">
                        <span class="${isMe ? 'font-bold text-purple-600' : ''}">${u.nickname}${isMe ? ' (我)' : ''}</span>
                        <div class="text-[10px] text-gray-400">${rank}</div>
                    </div>
                    <span class="font-black text-orange-500">${u.week_focus}min</span>
                </div>`;
            }).join('');
        }

        // ===== Data Sync Test =====
        async function saveTestData() {
            if (!currentUser) return;
            const text = document.getElementById('testDataInput').value;
            
            log('📤 保存数据到云端...');
            const { error } = await sb.from('user_data').upsert({
                user_id: currentUser.id,
                app_data: { test: text, saved_at: new Date().toISOString() },
                last_sync: new Date().toISOString()
            }, { onConflict: 'user_id' });

            if (error) {
                log('❌ 保存失败: ' + error.message, true);
                document.getElementById('dataStatus').innerHTML = `<span class="text-red-500">❌ ${error.message}</span>`;
            } else {
                log('✅ 数据已保存');
                document.getElementById('dataStatus').innerHTML = '<span class="text-green-500">✅ 已保存到云端</span>';
            }
        }

        async function loadTestData() {
            if (!currentUser) return;
            
            log('📥 从云端读取数据...');
            const { data, error } = await supabase
                .from('user_data')
                .select('*')
                .eq('user_id', currentUser.id)
                .single();

            if (error) {
                log('⚠️ 读取: ' + error.message);
                document.getElementById('dataStatus').innerHTML = `<span class="text-yellow-500">⚠️ ${error.message}</span>`;
            } else if (data) {
                document.getElementById('testDataInput').value = data.app_data?.test || '';
                log('✅ 数据已加载: ' + JSON.stringify(data.app_data).slice(0, 100));
                document.getElementById('dataStatus').innerHTML = `<span class="text-green-500">✅ 已从云端加载 (${data.last_sync})</span>`;
            }
        }
    </script>
</body>
</html>
